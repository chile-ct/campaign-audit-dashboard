name: Update Dashboard Data

on:
  schedule:
    # Every day at 10:00 AM Asia/Saigon = 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery google-auth

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp-creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json" >> $GITHUB_ENV

      - name: Update snapshot
        run: |
          python scripts/update_snapshot.py

      - name: Commit and push if changed
        run: |
          git config user.name "dashboard-bot"
          git config user.email "chile@chotot.vn"

          git add data/live-snapshot.json

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d')"
            git push
          fi
